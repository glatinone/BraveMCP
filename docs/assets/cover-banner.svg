<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img">
  <title>BraveMCP — Give Claude a memory of everything you browse</title>
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1a29"/>
      <stop offset="1" stop-color="#13111b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf0"/>
      <stop offset="1" stop-color="#5fd0c5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#cbg)"/>

  <!-- subtle node network motif on the right -->
  <g opacity="0.55" stroke="#3a3654" stroke-width="1.5" fill="none">
    <line x1="880" y1="150" x2="1000" y2="120"/>
    <line x1="1000" y1="120" x2="1090" y2="210"/>
    <line x1="880" y1="150" x2="940" y2="280"/>
    <line x1="940" y1="280" x2="1090" y2="210"/>
    <line x1="940" y1="280" x2="1010" y2="400"/>
    <line x1="1090" y1="210" x2="1120" y2="350"/>
    <line x1="1010" y1="400" x2="1120" y2="350"/>
    <line x1="940" y1="280" x2="840" y2="380"/>
    <line x1="840" y1="380" x2="1010" y2="400"/>
  </g>
  <g>
    <circle cx="880" cy="150" r="7" fill="#7c6cf0"/>
    <circle cx="1000" cy="120" r="9" fill="#5fd0c5"/>
    <circle cx="1090" cy="210" r="7" fill="#7c6cf0"/>
    <circle cx="940" cy="280" r="13" fill="#d97757"/>
    <circle cx="1010" cy="400" r="8" fill="#5fd0c5"/>
    <circle cx="1120" cy="350" r="6" fill="#7c6cf0"/>
    <circle cx="840" cy="380" r="6" fill="#5fd0c5"/>
  </g>

  <!-- eyebrow -->
  <rect x="90" y="120" width="300" height="34" rx="17" fill="#252336"/>
  <text x="110" y="143" fill="#9d8df1" font-size="16" font-weight="600" letter-spacing="1.5">LOCAL-FIRST · OPEN SOURCE</text>

  <!-- title -->
  <text x="90" y="250" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1">BraveMCP</text>

  <!-- subtitle -->
  <text x="92" y="320" fill="#e8e6f0" font-size="38" font-weight="600">Give Claude a memory of</text>
  <text x="92" y="368" fill="#e8e6f0" font-size="38" font-weight="600">everything you <tspan fill="#5fd0c5">browse</tspan>.</text>

  <!-- accent rule -->
  <rect x="92" y="406" width="120" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="92" y="470" fill="#9b98ac" font-size="22">A browser second brain for Claude Desktop, wired through the</text>
  <text x="92" y="502" fill="#9b98ac" font-size="22">Model Context Protocol. SQLite + ChromaDB. 100% on your machine.</text>

  <!-- footer chips -->
  <g font-size="17" font-weight="600">
    <rect x="92" y="540" width="150" height="38" rx="19" fill="#252336"/>
    <text x="167" y="565" fill="#cfcce0" text-anchor="middle">13 MCP tools</text>
    <rect x="254" y="540" width="170" height="38" rx="19" fill="#252336"/>
    <text x="339" y="565" fill="#cfcce0" text-anchor="middle">Hybrid search</text>
    <rect x="436" y="540" width="180" height="38" rx="19" fill="#252336"/>
    <text x="526" y="565" fill="#cfcce0" text-anchor="middle">Zero cloud calls</text>
  </g>
</svg>
