<svg width="780" height="640" viewBox="0 0 780 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img">
  <title>BraveMCP demo: Claude retrieving a forgotten page from local browser memory</title>
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#201e2c"/>
      <stop offset="1" stop-color="#16141e"/>
    </linearGradient>
    <linearGradient id="relbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fd0c5"/>
      <stop offset="1" stop-color="#7c6cf0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="780" height="640" rx="18" fill="url(#dbg)"/>

  <!-- title bar -->
  <circle cx="30" cy="30" r="6" fill="#ff5f57"/>
  <circle cx="50" cy="30" r="6" fill="#febc2e"/>
  <circle cx="70" cy="30" r="6" fill="#28c840"/>
  <text x="390" y="35" fill="#8b8898" font-size="13" text-anchor="middle" font-weight="500">BraveMCP · Claude Desktop</text>
  <rect x="640" y="18" width="116" height="24" rx="12" fill="#1b2b28"/>
  <circle cx="657" cy="30" r="4" fill="#5fd0c5"/>
  <text x="668" y="34" fill="#5fd0c5" font-size="11" font-weight="600">connected</text>
  <line x1="0" y1="58" x2="780" y2="58" stroke="#2c2a3a" stroke-width="1"/>

  <!-- user message -->
  <g filter="url(#sh)"><rect x="250" y="82" width="490" height="60" rx="15" fill="#6c5ce7"/></g>
  <text x="272" y="108" fill="#ffffff" font-size="14.5">Do you remember that article about MCP</text>
  <text x="272" y="129" fill="#ffffff" font-size="14.5">security I read last week?</text>
  <text x="718" y="160" fill="#6b6878" font-size="11" text-anchor="end">You</text>

  <!-- tool call -->
  <circle cx="46" cy="200" r="16" fill="#d97757"/>
  <text x="46" y="205" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">C</text>
  <g filter="url(#sh)"><rect x="74" y="184" width="430" height="46" rx="12" fill="#252336" stroke="#3a3750" stroke-width="1"/></g>
  <text x="92" y="204" fill="#9d8df1" font-size="12" font-weight="600">⚙ calling tool</text>
  <text x="92" y="221" fill="#cfcce0" font-size="12.5" font-family="'SF Mono', Menlo, Consolas, monospace">find_forgotten_content("MCP security hardening")</text>

  <!-- result card -->
  <g filter="url(#sh)"><rect x="74" y="244" width="640" height="158" rx="12" fill="#1a1826" stroke="#2f2c40" stroke-width="1"/></g>
  <text x="94" y="270" fill="#5fd0c5" font-size="11" font-weight="700" letter-spacing="0.5">MATCH FOUND</text>
  <!-- relevance bar -->
  <text x="694" y="270" fill="#9d8df1" font-size="11" font-weight="600" text-anchor="end">relevance 0.94</text>
  <rect x="94" y="280" width="600" height="6" rx="3" fill="#2a2838"/>
  <rect x="94" y="280" width="564" height="6" rx="3" fill="url(#relbar)"/>
  <text x="94" y="312" fill="#e8e6f0" font-size="15" font-weight="700">Model Context Protocol — Security Guidelines</text>
  <text x="94" y="332" fill="#7b7890" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">modelcontextprotocol.io/docs/security</text>
  <text x="94" y="356" fill="#b8b5c8" font-size="13">Outlines how hosts and clients prevent shell injection and handle</text>
  <text x="94" y="374" fill="#b8b5c8" font-size="13">sandbox credentials securely.</text>
  <rect x="94" y="384" width="128" height="20" rx="10" fill="#2a2838"/>
  <text x="158" y="398" fill="#9d8df1" font-size="10.5" text-anchor="middle">visited 3× · 4 days ago</text>

  <!-- claude answer -->
  <circle cx="46" cy="440" r="16" fill="#d97757"/>
  <text x="46" y="445" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">C</text>
  <g filter="url(#sh)"><rect x="74" y="424" width="640" height="184" rx="14" fill="#252336"/></g>
  <text x="96" y="454" fill="#e8e6f0" font-size="14.5">Yes — you visited the <tspan font-weight="700" fill="#fff">MCP Security Guidelines</tspan> 4 days</text>
  <text x="96" y="478" fill="#e8e6f0" font-size="14.5">ago, and opened it 3 times. It covers sandbox credential</text>
  <text x="96" y="502" fill="#e8e6f0" font-size="14.5">handling and shell injection prevention.</text>
  <text x="96" y="536" fill="#b8b5c8" font-size="13.5">Want me to summarize those security principles for you?</text>
  <line x1="96" y1="558" x2="694" y2="558" stroke="#2f2c40" stroke-width="1"/>
  <text x="96" y="584" fill="#5fd0c5" font-size="12">🧠 retrieved from your local browser memory · 100% offline</text>
</svg>
