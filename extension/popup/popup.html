<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* Premium Styling */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    
    :root {
      --bg-gradient: linear-gradient(135deg, #111218 0%, #171923 100%);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #5267F2;
      --primary-hover: #3b50db;
      --text: #F7FAFC;
      --text-muted: #A0AEC0;
      --green: #48BB78;
      --red: #F56565;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--bg-gradient);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      box-sizing: border-box;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #63B3ED 0%, #5267F2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--red);
      transition: all 0.3s ease;
      box-shadow: 0 0 6px var(--red);
    }

    .status-dot.connected {
      background-color: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-top: 0;
      margin-bottom: 10px;
    }

    .page-info {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
      line-height: 1.4;
    }

    .page-title {
      font-weight: 600;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-url {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(82, 103, 242, 0.2);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(82, 103, 242, 0.3);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      background: var(--card-bg);
      color: var(--text-muted);
      border: 1px solid var(--card-border);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .text-area {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      resize: none;
      height: 48px;
      transition: border-color 0.2s ease;
    }

    .text-area:focus {
      outline: none;
      border-color: var(--primary);
    }

    .feedback {
      font-size: 11px;
      font-weight: 500;
      margin-top: 6px;
      text-align: center;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .feedback.success {
      color: var(--green);
    }

    .feedback.error {
      color: var(--red);
    }

    .footer {
      font-size: 9px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="url(#logo-grad)"/>
        <defs>
          <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
            <stop stop-color="#63B3ED"/>
            <stop offset="1" stop-color="#5267F2"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">BraveMCP</span>
    </div>
    <div class="status-container">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Offline</span>
    </div>
  </div>

  <div class="section">
    <h3 class="section-title">Active Page</h3>
    <div class="page-info" style="margin-bottom: 12px;">
      <div id="page-title" class="page-title">Loading...</div>
      <div id="page-url" class="page-url">Loading...</div>
    </div>
    <button id="btn-capture" class="btn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 20H19V18H5V20ZM19 9H15V3H9V9H5L12 16L19 9Z" fill="currentColor"/>
      </svg>
      Capture Content
    </button>
    <div id="capture-feedback" class="feedback"></div>
  </div>

  <div class="section">
    <h3 class="section-title">Quick Note</h3>
    <div class="input-group">
      <textarea id="note-content" class="text-area" placeholder="Add a note to your second brain..."></textarea>
      <button id="btn-save-note" class="btn" disabled>Save Note</button>
      <div id="note-feedback" class="feedback"></div>
    </div>
  </div>

  <div class="footer">
    BraveMCP browser memory v0.1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
