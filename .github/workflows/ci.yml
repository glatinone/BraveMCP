name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: mcp-server/package-lock.json

    - name: Install Dependencies
      run: |
        cd mcp-server
        npm ci

    - name: Run Build
      run: |
        cd mcp-server
        npm run build
